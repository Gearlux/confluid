# =========================================================================
# HAND-WRITTEN workflow — NOT generated by `aisland jenkins scaffold`.
# (ci.yml / Jenkinsfile are generated; this release pipeline is separate so
# regeneration never clobbers it.)
#
# Publishes the `confluid` distribution to PyPI when a version tag is pushed:
#
#   git tag v0.2.0 && git push origin v0.2.0
#
# Uses PyPI Trusted Publishing (OIDC, no stored API token). One-time setup on
# https://pypi.org/manage/account/publishing/ — add a "pending publisher":
#   PyPI project name: confluid
#   Owner:             Gearlux
#   Repository:        confluid
#   Workflow name:     release.yml
#   Environment:       pypi
#
# Publish ORDER: loggair (already on PyPI) → confluid → liquifai. Downstream
# liquifai declares `confluid>=0.1.0`, so this package must publish first.
# =========================================================================
name: Release to PyPI

on:
  push:
    tags: ["v*"]

jobs:
  build:
    name: Build & verify distribution
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    - name: Install packaging toolchain
      run: python -m pip install build twine
    - name: Guard - tag matches pyproject version
      run: |
        PKG_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
        TAG_VERSION="${GITHUB_REF_NAME#v}"
        if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
          echo "::error::Tag v$TAG_VERSION does not match pyproject version $PKG_VERSION"
          exit 1
        fi
    - name: Build sdist + wheel
      run: python -m build
    - name: Check package metadata
      run: python -m twine check --strict dist/*
    - name: Smoke-test the built wheel in a clean venv
      # Runs from /tmp: with the repo root as cwd, `import confluid` would find
      # the SOURCE tree (cwd shadows site-packages) and silently test the repo
      # instead of the wheel.
      run: |
        python -m venv /tmp/smoke
        /tmp/smoke/bin/pip install --quiet dist/*.whl
        cd /tmp
        /tmp/smoke/bin/python - <<'EOF'
        from importlib.metadata import version

        import confluid

        @confluid.configurable
        class SmokeCfg:
            def __init__(self, value: int = 1):
                self.value = value

        f = confluid.Instance("SmokeCfg")
        f.kwargs.update({"value": 42})
        obj = confluid.materialize(f, context={})
        assert obj.value == 42
        print("wheel smoke-test OK, version:", version("confluid"))
        EOF
    - uses: actions/upload-artifact@v4
      with:
        name: dist
        path: dist/

  publish:
    name: Publish to PyPI
    needs: [build]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for PyPI Trusted Publishing (OIDC)
    steps:
    - uses: actions/download-artifact@v4
      with:
        name: dist
        path: dist/
    - name: Publish
      uses: pypa/gh-action-pypi-publish@release/v1
