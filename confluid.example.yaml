# Confluid: Example Configuration File
# This file illustrates the configuration options confluid handles directly.
# Note: scope overlays (debug:, production:, not <name>:, dotted hierarchies)
# are handled upstream by liquifai. See liquifai's docs for scope features.

# --- 1. Module Imports ---
# Dynamically import Python modules to populate the class registry.
import:
  - "my_project.models"
  - "my_project.utils"

# --- 2. File Inclusions ---
# Include other configuration files. Paths are relative to this file.
# included values are overlaid by the current file.
include:
  - "common_defaults.yaml"

# --- 3. Base Configuration ---
# Standard top-level settings and object configurations.
base_lr: 0.001

# Dotted Notation (Helios Style)
# These are expanded into nested dicts: {"Model": {"layers": 3, "dropout": 0.1}}
Model.layers: 3
Model.dropout: 0.1

# --- 4. Reference Syntax ---
# Reference tags are used for late resolution and dependency injection.
# !ref key -> Lookup in config (dotted paths supported)
# !class Class -> Lookup in registry
# !class Class(args) -> Instantiate with arguments
Trainer:
  lr: !ref base_lr
  model: !class Model(layers=10)
  # Environment variable resolution
  log_dir: "${HOME}/logs/my_app"
