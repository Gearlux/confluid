# Confluid: Example Configuration File
# This file illustrates the configuration options confluid handles directly.
# Scope overlays (!scope:NAME, !scope:KEY=VAL, !notscope:...) live at the
# bottom of this file. Activate them via `confluid.load(path, scopes=[...])`
# or, in a liquifai CLI, `--scope NAME` / `--scope KEY=VAL` / `--KEY VAL`.

# --- 1. Module Imports ---
# Dynamically import Python modules to populate the class registry.
import:
  - "my_project.models"
  - "my_project.utils"

# --- 2. File Inclusions ---
# Include other configuration files. Paths are relative to this file.
# included values are overlaid by the current file.
include:
  - "common_defaults.yaml"

# --- 3. Base Configuration ---
# Standard top-level settings and object configurations.
base_lr: 0.001

# String interpolation (${...}). The name decides the source:
#   plain name              -> environment variable  (${HOME}, ${PORT:8080})
#   dotted / bracketed name -> another CONFIG KEY     (${train.dataset}, ${items[0]})
# A whole-string match keeps the value's native type; embedded matches
# substitute str(value). On a miss the :default applies, else the literal
# ${...} is left in place. (For wiring a live OBJECT into a slot, use !ref:.)
train:
  dataset: RFUAV
  version: v3
data_dir: "${HOME}/data/${train.dataset}/${train.version}"

# Dotted Notation (Helios Style)
# These are expanded into nested dicts: {"Model": {"layers": 3, "dropout": 0.1}}
# Addressed keys are EXACT: they configure the matched node only, never its
# descendants. A bare key (like base_lr above, if a class accepted it) is the
# opposite — it broadcasts tree-wide. Glob wildcards opt back into cascade:
#   Trainer.*.lr: 0.001     -> Trainer's DIRECT children only
#   Trainer.**.lr: 0.001    -> Trainer AND all its descendants (declare-once)
# ('*' = exactly one level, '**' = zero or more; quote a key that STARTS with
# '*', e.g. '**.lr': 0.001 — a bare * opens a YAML alias.)
Model.layers: 3
Model.dropout: 0.1

# --- 4. Reference Syntax ---
# Reference tags are used for late resolution and dependency injection.
# !ref key -> Lookup in config (dotted paths supported)
# !class Class -> Lookup in registry
# !class Class(args) -> Instantiate with arguments
Trainer:
  lr: !ref base_lr
  model: !class Model(layers=10)
  # Environment variable resolution
  log_dir: "${HOME}/logs/my_app"

# --- 5. Scopes ---
# Optional aliases let one CLI name expand to multiple boolean scopes.
scope_aliases:
  dev: [debug, local]

# A scope wrapper lives at an arbitrary key whose VALUE carries the
# !scope:/!notscope: tag. The key itself is inert — it's just YAML
# scaffolding because top-level mappings can't hold bare tags. Pick a
# descriptive label; on activation the key disappears and its contents
# are spliced in at that slot.

# Boolean scope: fires when the user passes `--scope debug`.
if_debug: !scope:debug
  log_level: DEBUG
  base_lr: 0.0001

# Keyed scope (assignment form): fires for `--scope task=classification`
# or, equivalently, `--task classification` / `--task=classification`.
if_classification: !scope:task=classification
  model: !class Model(layers=3)

# Keyed scope (function-call form) — semantically identical to the
# assignment form above. Use whichever reads better in context.
if_prod: !scope:env(prod)
  log_level: WARNING

# Negative scope. Active when no `--task ...` is supplied at all OR when
# the supplied value differs from `segmentation` (the unset-⇒-active rule).
unless_segmentation: !notscope:task=segmentation
  postproc: !class DefaultPost()
